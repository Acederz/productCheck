# 市场数据分类管理平台 - Nginx 配置示例
# 安装位置建议：/etc/nginx/conf.d/product_check.conf
# 按实际域名 / 服务器 IP、项目路径修改后执行：nginx -t && systemctl reload nginx

upstream product_check_api {
    # uWSGI http-socket 地址（与 deploy/uwsgi/product_check.ini 一致）
    server 127.0.0.1:5000;
    keepalive 8;
}

server {
    listen 80;
    # 若有域名请改成真实域名；仅用 IP 访问可写 _
    server_name _;

    # 上传 Excel 最大 50MB（与后端 MAX_CONTENT_LENGTH 一致）
    client_max_body_size 50m;

    # 前端静态资源（npm run build 产物）
    root /home/topuser/productCheck/frontend/dist;
    index index.html;

    # 前端 SPA：刷新子路由时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反代到 uWSGI（http-socket）
    location /api/ {
        proxy_pass http://product_check_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 静态资源缓存（可选）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    access_log /var/log/nginx/product_check_access.log;
    error_log  /var/log/nginx/product_check_error.log;
}
