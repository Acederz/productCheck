# 市场数据分类管理平台 - Nginx 配置示例
# 前端对外端口：5173；后端 uWSGI：127.0.0.1:5174
# 若你已有 /usr/local/nginx/conf/nginx.conf，请把本文件内容合并进现有配置，勿重复 listen 冲突端口

upstream product_check_api {
    # 必须与 deploy/uwsgi/product_check.ini 的 http-socket 一致
    server 127.0.0.1:5174;
    keepalive 8;
}

server {
    # 浏览器访问前端页面的端口
    listen 5173;
    server_name _;

    client_max_body_size 50m;

    root /home/topuser/productCheck/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api 反代到本机 uWSGI
    location /api/ {
        proxy_pass http://product_check_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # 源码安装的 Nginx 日志目录一般为 /usr/local/nginx/logs/
    access_log /usr/local/nginx/logs/product_check_access.log;
    error_log  /usr/local/nginx/logs/product_check_error.log;
}
