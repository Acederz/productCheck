# productCheck uWSGI 配置（系统 uwsgi + 项目虚拟环境）
# 系统 uwsgi 路径：/usr/local/python312/bin/uwsgi
# 启动：/usr/local/python312/bin/uwsgi --ini /home/topuser/productCheck/deploy/uwsgi/product_check.ini

[uwsgi]
# ---------- 目录与入口 ----------
# 工作目录必须是 backend，才能加载 wsgi:app
chdir = /home/topuser/productCheck/backend
module = wsgi:app

# ---------- Python 虚拟环境 ----------
# 用项目 .venv 里的第三方包（Flask 等），不要把业务包装到系统 Python
# 注意：.venv 必须用「同一套」Python 3.12 创建，例如：
#   /usr/local/python312/bin/python3 -m venv /home/topuser/productCheck/.venv
virtualenv = /home/topuser/productCheck/.venv
pythonpath = /home/topuser/productCheck/backend

# ---------- 监听地址（与 Nginx upstream 一致）----------
http-socket = 127.0.0.1:5174

# ---------- 进程模型 ----------
master = true
processes = 4
threads = 2
enable-threads = true

# ---------- 超时（导入/导出 Excel）----------
harakiri = 300
http-timeout = 300
socket-timeout = 300

# ---------- 上传缓冲 ----------
buffer-size = 65535
post-buffering = 8192

# ---------- 退出与清理 ----------
die-on-term = true
vacuum = true
lazy-apps = true

# ---------- 日志 / PID ----------
logto = /home/topuser/productCheck/logs/uwsgi.log
log-date = true
pidfile = /home/topuser/productCheck/logs/uwsgi.pid

# ---------- 环境变量 ----------
env = FLASK_ENV=production
env = PYTHONUTF8=1
env = PYTHONIOENCODING=utf-8

# ---------- 运行用户（按你的约定用 root）----------
uid = root
gid = root
